name: Relay relatório VSL

on:
  push:
    branches: [main]
    paths:
      - 'relatorios/*.json'
  workflow_dispatch:
    inputs:
      file:
        description: 'Arquivo (ex relatorios/2026-05-04.json)'
        required: true

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Identifica arquivos
        id: files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ github.event.inputs.file }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^relatorios/.*\.json$' | tr '\n' ' ' || true)
            echo "files=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Publica + WhatsApp
        env:
          RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          WHATSAPP_RELAY_URL: ${{ secrets.WHATSAPP_RELAY_URL }}
          WHATSAPP_GROUP_JID: ${{ secrets.WHATSAPP_GROUP_JID }}
          FILES: ${{ steps.files.outputs.files }}
        run: python3 .github/scripts/relay.py
